services:
  - type: web
    name: weather-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_dashboard.shservices:
  - type: web
    name: weather-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_dashboard.sh
    autoDeploy: true

  - type: cron
    name: weather-refresh
    runtime: python
    plan: free
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: bash refresh_data.sh
