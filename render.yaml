services:
  - type: web
    name: weather-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_dashboard.sh

  # ── Media monitor — runs 4x daily to check news for active weather events ──
  # When media picks up a weather event it marks it as confirmed in the DB,
  # triggering the EXIT SIGNAL banner on the Radar card.
  - type: cron
    name: media-monitor
    runtime: python
    plan: free
    schedule: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python media_validator.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: weather-dashboard
          property: connectionString
      - key: NEWSAPI_KEY
        sync: false   # inherits from dashboard service env vars

  # ── Alt-data scanner — runs every 4 hours ─────────────────────────────────
  # Sources: SEC EDGAR 8-K (no key), NASA FIRMS fires (no key),
  #          GDELT labor unrest (no key), NRC incidents (no key),
  #          LME warehouse (NASDAQ key optional), USDA crops (USDA key optional)
  - type: cron
    name: alt-data-scanner
    runtime: python
    plan: free
    schedule: "0 */4 * * *"   # 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python alt_data_monitor.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: weather-dashboard
          property: connectionString
      - key: NASDAQ_DATA_LINK_KEY
        sync: false   # optional — enables LME warehouse scanner
      - key: USDA_NASS_KEY
        sync: false   # optional — enables USDA crop progress scanner

  # ── Policy monitor — runs every 15 min, fastest signal in the system ─────────
  # Scans GDELT for statements by 45 central bank governors + finance ministers.
  # Classifies hawkish/dovish/trade-war/stimulus/sanctions → maps to tickers.
  # GDELT updates every 15 min so this scanner is effectively real-time.
  - type: cron
    name: policy-monitor
    runtime: python
    plan: free
    schedule: "*/15 * * * *"   # every 15 minutes, 24/7
    buildCommand: pip install -r requirements.txt
    startCommand: python policy_monitor.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: weather-dashboard
          property: connectionString

  # ── Mining news scanner — runs every 2 hours to detect supply disruptions ──
  # Scans GDELT, Google News RSS, Bing RSS, NewsAPI for events at 20+ global
  # mining regions. Writes scored signals to the `mining_signals` DB table.
  - type: cron
    name: mining-news-scanner
    runtime: python
    plan: free
    schedule: "0 */2 * * *"   # every 2 hours: 00:00, 02:00, 04:00 … UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python mining_news_monitor.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: weather-dashboard
          property: connectionString
      - key: NEWSAPI_KEY
        sync: false   # inherits from dashboard service env vars
