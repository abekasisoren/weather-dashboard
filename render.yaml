services:
  # ── Weather signal pipeline — runs every 12 hours ────────────────────────────
  # Steps: ECMWF GRIB download → generate_signals.py → generate_global_shocks.py
  # Cleans up *.grib2 files after each run. 2 builds/day.
  - type: cron
    name: weather-signal-updater
    runtime: python
    plan: starter
    schedule: "0 */12 * * *"   # 00:00 and 12:00 UTC daily  (2 builds/day)
    buildCommand: pip install -r requirements.txt
    startCommand: bash run_weather_pipeline.sh
    envVars:
      - key: DATABASE_URL
        sync: false

  # ── Media monitor — 4x daily ─────────────────────────────────────────────────
  - type: cron
    name: media-monitor
    runtime: python
    plan: starter
    schedule: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC  (4 builds/day)
    buildCommand: pip install -r requirements.txt
    startCommand: python media_validator.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEWSAPI_KEY
        sync: false
